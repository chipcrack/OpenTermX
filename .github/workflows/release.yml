name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --bundles app,dmg
            bundle_label: macos
          - platform: ubuntu-22.04
            args: --bundles deb
            bundle_label: linux-deb
          - platform: ubuntu-22.04
            args: --bundles appimage
            bundle_label: linux-appimage
            experimental: true
          - platform: windows-latest
            args: --bundles msi,nsis
            bundle_label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf \
            xdg-utils \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para firmar y notarizar macOS en el futuro, descomenta estas variables
          # y crea los siguientes secrets en GitHub Actions:
          # APPLE_ID: correo de la cuenta Apple Developer
          # APPLE_PASSWORD: app-specific password del Apple ID
          # APPLE_TEAM_ID: Team ID de Apple Developer
          # APPLE_CERTIFICATE: certificado Developer ID Application exportado en base64
          # APPLE_CERTIFICATE_PASSWORD: password del archivo .p12
          # KEYCHAIN_PASSWORD: password temporal para el keychain del runner
          #
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: "Developer ID Application: Tu Nombre o Empresa (TEAMID)"
        with:
          tagName: v__VERSION__
          releaseName: OpenTermX v__VERSION__
          releaseBody: See the assets attached to this release to install OpenTermX on your platform.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Si más adelante decides firmar macOS, añade antes del paso anterior un bloque
      # para importar el certificado .p12 al keychain del runner y resolver la identidad
      # Developer ID Application. Por ahora este workflow construye macOS sin firma.
